<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebration</title>
    <style>
        :root {
            --dark-pink: #d81b60;
            --soft-pink: #fce4ec;
        }
        body, html {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            background: var(--soft-pink);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        .screen {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; position: relative;
            padding: 20px;
        }
        .hidden { display: none !important; }

        /* Button Styling */
        button {
            background-color: var(--dark-pink);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            border-radius: 50px; /* Soft curves */
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); }

        /* Page 1 Big Bold Paras */
        .big-para {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--dark-pink);
            margin: 100px 0;
            opacity: 0;
            transition: opacity 1.5s;
        }
        .visible { opacity: 1; }

        /* Full Screen Cake */
        .cake-container {
            font-size: 250px; /* Huge cake */
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .flame {
            font-size: 80px;
            position: absolute;
            top: -40px;
            animation: flicker 0.1s infinite;
        }
        @keyframes flicker {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Large Gift Grid */
        .gift-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }
        .gift-box {
            width: 250px; /* More large */
            height: 250px;
            background: var(--dark-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            cursor: pointer;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Emoji Rain */
        .emoji {
            position: fixed; top: -50px;
            font-size: 30px;
            z-index: 1000;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .photo-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 2000; color: white;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Saja_Boys_Ft_Andrew_Choi_neckwav_Danny_Chung_Kevin_Woo_SamUIL_KPop_Demon_Hunters_Cast_-_Soda_Pop_thinknews.com.ng.mp3" type="audio/mpeg">
    </audio>

    <section id="page1" class="screen">
        <h1 style="font-size: 4rem; color: var(--dark-pink);">Happy Birthday!!</h1>
        <button onclick="initiateSequence()">Click Here</button>
    </section>

    <section id="page2" class="screen hidden">
        <h2 id="daysAlive" style="font-size: 3rem; color: var(--dark-pink);"></h2>
        
        <div id="paraWrapper">
            <p class="big-para">You've been amazing for every single day.</p>
            <p class="big-para">A journey that started in 2008...</p>
            <p class="big-para">Has turned into something beautiful.</p>
            <p class="big-para">Today, we celebrate YOU!</p>
        </div>

        <div id="cakeSection" class="hidden">
            <div class="cake-container" onclick="startBlowCountdown()">
                <div class="flame" id="flame">🔥</div>
                🎂
            </div>
            <h2 id="blowMsg" style="font-size: 2rem;">Click the cake!</h2>
        </div>
    </section>

    <section id="page3" class="screen hidden">
        <h1 style="margin-bottom: 50px;">Open the Gifts</h1>
        <div class="gift-container">
            <div class="gift-box" onclick="openGift(1)">🎁</div>
            <div class="gift-box" onclick="openGift(2)">🎁</div>
            <div class="gift-box" onclick="openGift(3)">🎁</div>
            <div class="gift-box" onclick="openGift(4)">🎁</div>
        </div>
        
        <div id="footer-space" style="height: 100vh;"></div>
        <h1 id="finalMsg" style="font-size: 3rem; padding-bottom: 100px;">May your year be as wonderful as you are! ✨</h1>
    </section>

    <div id="photoModal" class="photo-overlay hidden">
        <img id="modalImg" src="" style="max-height: 60%; border-radius: 20px;">
        <h2 id="modalTxt"></h2>
        <button onclick="closeGift()">Open Next</button>
    </div>

    <script>
        const birthDate = new Date("August 14, 2008");
        let giftsOpened = 0;

        function initiateSequence() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
            document.getElementById('bgMusic').play();
            startEmojiRain();
            calculateDays();
            showParas();
        }

        function calculateDays() {
            setInterval(() => {
                const now = new Date();
                const diff = now - birthDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('daysAlive').innerText = `${days} Days of Excellence`;
            }, 1000);
        }

        function showParas() {
            const paras = document.querySelectorAll('.big-para');
            paras.forEach((p, i) => {
                setTimeout(() => {
                    p.classList.add('visible');
                    window.scrollBy(0, window.innerHeight / 2);
                }, i * 3000);
            });

            setTimeout(() => {
                document.getElementById('cakeSection').classList.remove('hidden');
                window.scrollTo(0, document.body.scrollHeight);
            }, paras.length * 3500);
        }

        function startBlowCountdown() {
            let count = 3;
            const msg = document.getElementById('blowMsg');
            const timer = setInterval(() => {
                msg.innerText = `Blow in ${count}...`;
                count--;
                if (count < 0) {
                    clearInterval(timer);
                    msg.innerText = "LET'S GO!!";
                    document.getElementById('flame').classList.add('hidden');
                    setTimeout(() => {
                        document.getElementById('page2').classList.add('hidden');
                        document.getElementById('page3').classList.remove('hidden');
                        window.scrollTo(0, 0);
                    }, 1500);
                }
            }, 1000);
        }

        function startEmojiRain() {
            const emojis = ['💖', '🎂', '🎊', '🎉', '✨'];
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'emoji';
                e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                e.style.left = Math.random() * 100 + "vw";
                e.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 5000);
            }, 300);
        }

        const giftData = {
            1: { img: 'Screenshot_2026-05-04-15-49-55-674.jpeg', msg: 'The Start!' },
            2: { img: 'Screenshot_2026-05-04-15-51-20-647.jpeg', msg: 'Best Memories' },
            3: { img: 'Screenshot_2026-05-04-15-34-31-232.jpeg', msg: 'Growing Up' },
            4: { img: 'photo4.jpg', msg: 'To the Future!' }
        };

        function openGift(id) {
            document.getElementById('modalImg').src = giftData[id].img;
            document.getElementById('modalTxt').innerText = giftData[id].msg;
            document.getElementById('photoModal').classList.remove('hidden');
        }

        function closeGift() {
            document.getElementById('photoModal').classList.add('hidden');
            giftsOpened++;
            if (giftsOpened >= 4) {
                // Auto scroll to final message after all gifts are done
                setTimeout(() => {
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                }, 500);
            }
        }
    </script>
</body>
</html>
